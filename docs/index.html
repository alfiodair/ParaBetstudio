<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ParaBetstudio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <img src="logo.png" alt="ParaBetstudio logo" class="logo"/>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-card">
        <img src="hero-logo.png" alt="Joker Fortuna" class="hero-logo"/>
        <h1>JOKER FORTUNA</h1>
        <p class="subtitle">Pagando premios las 24hs</p>
        <!-- Enlace a WhatsApp: se abre en nueva pestaña en escritorio; en móvil intenta abrir la app y si falla abre WhatsApp Web -->
        <a class="btn-primary" id="claim-btn" href="https://wa.me/595986411949?text=Hola%2C%20quiero%20reclamar%20el%20bono" target="_blank" rel="noopener">RECLAMAR BONO</a>
      </div>
    </section>

    <section class="games">
      <h2>JUEGOS MÁS JUGADOS</h2>
      <div class="cards">
        <div class="card">BUFFALO KING</div>
        <div class="card">GATES OF OLYMPUS</div>
        <div class="card">BIG BASS BONANZA</div>
        <div class="card">SWEET BONANZA</div>
        <div class="card">STARLIGHT PRINCESS</div>
      </div>
    </section>

    <footer class="site-footer">
      <p>© 2026 ParaBetstudio. Todos los derechos reservados.</p>
    </footer>
  </main>

  <script>
    // Configuración de WhatsApp
    (function(){
      const phone = '595986411949';
      const text = encodeURIComponent('Hola, quiero reclamar el bono');
      const waWeb = `https://wa.me/${phone}?text=${text}`;
      const waApp = `whatsapp://send?phone=${phone}&text=${text}`;
      const btn = document.getElementById('claim-btn');

      function isMobile() {
        return /Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent);
      }

      if(!btn) return;

      btn.addEventListener('click', function(e){
        // Si es móvil intentamos abrir la app nativa; si no, abrimos WhatsApp Web en nueva pestaña
        if(isMobile()){
          try{
            window.location = waApp;
          }catch(err){
            window.open(waWeb, '_blank');
          }
          setTimeout(function(){
            window.open(waWeb, '_blank');
          }, 900);
          e.preventDefault();
        } else {
          window.open(waWeb, '_blank');
          e.preventDefault();
        }
      });
    })();
  </script>

  <noscript>
    <!-- Si JavaScript está deshabilitado, el enlace apunta directamente a WhatsApp Web y se abre en nueva pestaña por el atributo target -->
  </noscript>
</body>
</html>
